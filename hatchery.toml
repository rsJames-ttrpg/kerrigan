[queen]
name = "dev-hatchery"
overseer_url = "http://localhost:3100"
drone_dir = "./drones"
max_concurrency = 4
drone_timeout = "2h"

[creep]
enabled = true

[notifications]
backend = "webhook"
url = "https://signal.home.lan/v2/send"
token = "env:SIGNAL_API_TOKEN"
tls_skip_verify = true
events = ["drone_spawned", "drone_completed", "drone_failed", "drone_stalled", "drone_timed_out"]

[notifications.body]
message = "{{message}}"
number = "YOUR_NUMBER"
recipients = ["YOUR_NUMBER"]

[evolution]
enabled = false
# min_sessions = 5        # minimum sessions required before analysis runs
# run_interval = 10       # trigger after this many completed runs since last analysis
# time_interval = "24h"   # trigger after this duration since last analysis
# drone_definition = "evolve-from-analysis"  # job definition to submit with report
