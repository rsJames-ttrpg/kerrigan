[queen]
name = "dev-hatchery"
overseer_url = "http://localhost:3100"
drone_dir = "./drones"
max_concurrency = 4
drone_timeout = "2h"

[creep]
enabled = true

[notifications]
backend = "webhook"
url = "https://signal.home.lan/v2/send"
token = "env:SIGNAL_API_TOKEN"
tls_skip_verify = true
events = ["drone_spawned", "drone_completed", "drone_failed", "drone_stalled", "drone_timed_out"]

[notifications.body]
message = "{{message}}"
number = "YOUR_NUMBER"
recipients = ["YOUR_NUMBER"]
