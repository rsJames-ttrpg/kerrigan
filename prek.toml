[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-toml" },
  { id = "check-merge-conflict" },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "rustfmt"
name = "rustfmt (hermetic)"
entry = "buck2 run root//tools:rustfmt -- --check"
language = "system"
types = ["rust"]

[[repos.hooks]]
id = "clippy"
name = "clippy (hermetic)"
entry = "bash -c 'OUTPUT=$(buck2 build \"root//src/overseer:overseer[clippy.txt]\" --show-output 2>/dev/null | awk \"{print \\$2}\") && [ -f \"$OUTPUT\" ] && ! grep -q \"warning\\|error\" \"$OUTPUT\"'"
language = "system"
types = ["rust"]
pass_filenames = false

[[repos.hooks]]
id = "reindeer-check"
name = "reindeer in sync"
entry = "bash -c './tools/buckify.sh && git diff --exit-code third-party/BUCK'"
language = "system"
files = "Cargo\\.(toml|lock)$"
pass_filenames = false

[[repos.hooks]]
id = "buck2-build"
name = "buck2 build"
entry = "buck2 build root//..."
language = "system"
pass_filenames = false
stages = ["pre-push"]

[[repos.hooks]]
id = "buck2-test"
name = "buck2 test"
entry = "buck2 test //src/..."
language = "system"
pass_filenames = false
stages = ["pre-push"]
