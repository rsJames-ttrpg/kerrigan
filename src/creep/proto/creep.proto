syntax = "proto3";
package creep.v1;

service FileIndex {
  rpc SearchFiles(SearchFilesRequest) returns (SearchFilesResponse);
  rpc GetFileMetadata(GetFileMetadataRequest) returns (GetFileMetadataResponse);
  rpc RegisterWorkspace(RegisterWorkspaceRequest) returns (RegisterWorkspaceResponse);
  rpc UnregisterWorkspace(UnregisterWorkspaceRequest) returns (UnregisterWorkspaceResponse);
  rpc SearchSymbols(SearchSymbolsRequest) returns (SearchSymbolsResponse);
  rpc ListFileSymbols(ListFileSymbolsRequest) returns (ListFileSymbolsResponse);
}

message SearchFilesRequest {
  string pattern = 1;
  optional string workspace = 2;
  optional string file_type = 3;
}

message SearchFilesResponse {
  repeated FileMetadata files = 1;
}

message GetFileMetadataRequest {
  string path = 1;
}

message GetFileMetadataResponse {
  optional FileMetadata file = 1;
}

message FileMetadata {
  string path = 1;
  uint64 size = 2;
  int64 modified_at = 3;
  string file_type = 4;
  string content_hash = 5;
}

message RegisterWorkspaceRequest {
  string path = 1;
}

message RegisterWorkspaceResponse {
  uint64 files_indexed = 1;
}

message UnregisterWorkspaceRequest {
  string path = 1;
}

message UnregisterWorkspaceResponse {}

message SymbolInfo {
  string name = 1;
  string kind = 2;
  string file = 3;
  uint32 line = 4;
  uint32 end_line = 5;
  optional string parent = 6;
  optional string signature = 7;
}

message SearchSymbolsRequest {
  string query = 1;
  optional string kind = 2;
  optional string workspace = 3;
}

message SearchSymbolsResponse {
  repeated SymbolInfo symbols = 1;
}

message ListFileSymbolsRequest {
  string path = 1;
}

message ListFileSymbolsResponse {
  repeated SymbolInfo symbols = 1;
}

// --- LSP Service ---

service LspService {
  rpc GetDiagnostics(GetDiagnosticsRequest) returns (GetDiagnosticsResponse);
  rpc GetFileDiagnostics(GetFileDiagnosticsRequest) returns (GetFileDiagnosticsResponse);
  rpc GotoDefinition(GotoDefinitionRequest) returns (GotoDefinitionResponse);
  rpc FindReferences(FindReferencesRequest) returns (FindReferencesResponse);
}

message GetDiagnosticsRequest {
  string workspace_path = 1;
  int32 min_severity = 2;
  uint32 max_results = 3;
}

message GetDiagnosticsResponse {
  repeated Diagnostic diagnostics = 1;
  uint32 total_count = 2;
}

message Diagnostic {
  string file_path = 1;
  uint32 line = 2;
  uint32 column = 3;
  string severity = 4;
  string message = 5;
  string source = 6;
}

message GetFileDiagnosticsRequest {
  string workspace_path = 1;
  string file_path = 2;
}

message GetFileDiagnosticsResponse {
  repeated Diagnostic diagnostics = 1;
}

message GotoDefinitionRequest {
  string file_path = 1;
  uint32 line = 2;
  uint32 column = 3;
}

message GotoDefinitionResponse {
  repeated SymbolLocation locations = 1;
}

message FindReferencesRequest {
  string file_path = 1;
  uint32 line = 2;
  uint32 column = 3;
  bool include_declaration = 4;
}

message FindReferencesResponse {
  repeated SymbolLocation locations = 1;
}

message SymbolLocation {
  string file_path = 1;
  uint32 start_line = 2;
  uint32 start_column = 3;
  uint32 end_line = 4;
  uint32 end_column = 5;
}
